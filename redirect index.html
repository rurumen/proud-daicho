<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プラウド台帳 ─ 引っ越しました</title>

<!-- 0秒後に新しいURLへ自動で移動する -->
<meta http-equiv="refresh" content="0; url=https://rurumen.github.io/prowd-daicho/">
<link rel="canonical" href="https://rurumen.github.io/prowd-daicho/">

<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
<style>
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#FFF6FB; color:#5B4A57;
    font-family:'M PLUS Rounded 1c',sans-serif; text-align:center; padding:24px;
  }
  .box{
    background:#fff; border-radius:24px; padding:36px 28px; max-width:420px;
    box-shadow:0 10px 32px rgba(240,86,139,.16);
  }
  h1{
    font-family:'Zen Maru Gothic',sans-serif; font-weight:900; font-size:22px;
    margin:0 0 14px; color:#F0568B;
  }
  p{ font-size:14px; line-height:1.9; margin:0 0 20px; }
  .note{ font-size:12px; color:#9A8A96; }
  a.btn{
    display:inline-block; background:#F0568B; color:#fff; text-decoration:none;
    padding:14px 26px; border-radius:24px; font-weight:700; font-size:14px;
    box-shadow:0 6px 18px rgba(240,86,139,.35);
  }
  a.btn:hover{ background:#d94679; }
  .leaf{ font-size:40px; display:block; margin-bottom:10px; }
</style>
</head>
<body>
  <div class="box">
    <span class="leaf">🌱</span>
    <h1>新しいURLに移動しました</h1>
    <p>
      プラウド台帳のアドレスが変わりました。<br>
      自動で新しいページへ移動します。
    </p>
    <p>
      <a class="btn" href="https://rurumen.github.io/prowd-daicho/">▶ 新しいプラウド台帳をひらく</a>
    </p>
    <p class="note">
      移動しない場合は、上のボタンを押してください。<br>
      ブックマークやホーム画面のアイコンは、<br>
      新しいURLで登録し直してください。
    </p>
  </div>

  <script>
    // 念のため、JavaScriptでも移動させる
    location.replace('https://rurumen.github.io/prowd-daicho/');
  </script>
</body>
</html>
